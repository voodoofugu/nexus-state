name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 20+ — the test tooling (vitest) needs require(ESM), added in
        # 20.19 / 22.12. The published package itself runs on older Node.
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepare publish package
        run: node scripts/prepare-publish.mjs

      - name: Check published types (are-the-types-wrong)
        run: cd publish && npx --yes @arethetypeswrong/cli@latest --pack
